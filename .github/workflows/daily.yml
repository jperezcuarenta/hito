name: Daily Hitomezashi Stitch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stitch-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install numpy matplotlib

      - name: Run Daily Stitch
        run: python hito.py stitch

      - name: Push Stitches to Profile
        run: |
          git config --global user.email "74475911+jperezcuarenta@users.noreply.github.com"
          git config --global user.name "jperezcuarenta"
          # This pushes the 20 empty commits generated by the script
          git push origin main